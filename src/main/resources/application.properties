spring.application.name=ms-stock

# Conexiůn a MariaDB (XAMPP por defecto no tiene contraseŮa en root)
spring.datasource.url=jdbc:mariadb://localhost:3306/db_stock
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuraciůn de Hibernate (Spring Data JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Especificar explŪcitamente el dialecto de MariaDB para Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect