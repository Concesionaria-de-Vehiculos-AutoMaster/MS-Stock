spring.application.name=ms-stock

server.port= 8080

# Conexión a MariaDB (XAMPP por defecto no tiene contraseńa en root)
spring.datasource.url=jdbc:mariadb://localhost:3306/db_stock
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuración de Hibernate (Spring Data JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Especificar explícitamente el dialecto de MariaDB para Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

server.error.include-message=always